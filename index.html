<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語テストアプリ</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 2rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        .screen { display: none; }
        #setup-screen { display: block; }
        h1 {
            color: #1a73e8;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        legend {
            font-weight: 600;
            padding: 0 0.5rem;
            color: #555;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #555;
        }
        .form-group input:not([type="radio"]) {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .form-group input[type="radio"] {
            width: auto;
            transform: scale(1.2);
            margin: 0;
            cursor: pointer;
        }
        .btn {
            background-color: #1a73e8;
            color: #fff;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.1s;
            display: inline-block;
            margin-top: 1rem;
            width: 100%;
        }
        .btn:hover { background-color: #155ab6; }
        .btn:active { transform: scale(0.98); }
        #start-review-btn {
            background-color: #ff9800;
        }
        #start-review-btn:hover {
            background-color: #fb8c00;
        }
        
        #word-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
        }
        #word-display {
            font-size: 3rem;
            color: #2c3e50;
            margin: 0;
        }
        #speak-btn {
            font-size: 1.8rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }
        #speak-btn:hover {
            transform: scale(1.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #1a73e8;
            background-color: #eaf2ff;
        }
        .option-btn.correct {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
            font-weight: bold;
        }
        .option-btn.wrong {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }
        #progress-info {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: #6c757d;
        }
        #feedback {
            margin-top: 1.5rem;
            font-size: 1.3rem;
            font-weight: 600;
            min-height: 2rem;
            line-height: 1.5;
        }
        #next-btn {
            display: none;
            margin: 2rem auto 0;
            width: auto;
            background-color: #28a745;
        }
        #next-btn:hover { background-color: #218838; }
        #result-screen h2 {
            color: #28a745;
            font-size: 2.2rem;
        }
        #result-screen p {
            font-size: 1.5rem;
            margin: 0.8rem 0;
        }
        .result-list {
            list-style: none;
            padding: 0;
            margin-top: 2rem;
            text-align: left;
        }
        .result-item {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-word {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .result-meaning {
            color: #666;
            margin-top: 0.2rem;
            font-size: 0.9rem;
        }
        .result-status {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .status-correct {
            color: #28a745;
        }
        .status-wrong {
            color: #dc3545;
        }

        /* スマートフォン向け最適化（1画面に収めるための調整） */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 1rem;
            }
            #word-display {
                font-size: 2rem;
                margin: 0.8rem 0;
            }
            .options-grid {
                grid-template-columns: repeat(2, 1fr); /* 2列配置にして縦幅を節約 */
                gap: 0.5rem; /* 余白を減らす */
                margin-top: 1rem;
            }
            .option-btn {
                padding: 0.8rem 0.5rem; /* ボタンの高さを抑える */
                font-size: 0.9rem;     /* 文字を少し小さく */
                line-height: 1.2;
            }
            #feedback {
                margin-top: 0.8rem;
                height: 1.5rem;
                font-size: 1.1rem;
            }
            .btn {
                padding: 0.8rem 1.5rem;
                font-size: 1.1rem;
            }
            #progress-info {
                margin-bottom: 0.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>英単語テスト</h1>
        <div id="setup-screen" class="screen">
            <fieldset>
                <legend>通常テスト</legend>
                <div class="form-group">
                    <label>単語セット</label>
                    <div style="display: flex; gap: 1.5rem; padding-top: 0.5rem;">
                        <label style="font-weight: normal; display: inline-flex; align-items: center; gap: 0.3rem;"><input type="radio" name="wordSet" value="1200" checked> 1200</label>
                        <label style="font-weight: normal; display: inline-flex; align-items: center; gap: 0.3rem;"><input type="radio" name="wordSet" value="1400"> 1400</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>出題形式</label>
                    <div style="display: flex; gap: 1.5rem; padding-top: 0.5rem;">
                        <label style="font-weight: normal; display: inline-flex; align-items: center; gap: 0.3rem;"><input type="radio" name="testMode" value="en2ja" checked> 英語 → 日本語</label>
                        <label style="font-weight: normal; display: inline-flex; align-items: center; gap: 0.3rem;"><input type="radio" name="testMode" value="ja2en"> 日本語 → 英語 (スペル)</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="start-range">出題範囲 (開始番号)</label>
                    <input type="number" id="start-range" value="1" min="1">
                </div>
                <div class="form-group">
                    <label for="end-range">出題範囲 (終了番号)</label>
                    <input type="number" id="end-range" value="1900" min="1">
                </div>
                <div class="form-group">
                    <label for="num-questions">問題数</label>
                    <input type="number" id="num-questions" value="10" min="1">
                </div>
                <button id="start-btn" class="btn">テスト開始</button>
            </fieldset>

            <fieldset>
                <legend>苦手な単語を復習する</legend>
                <div class="form-group">
                    <label for="num-review-questions">不正解の多い単語から出題する数</label>
                    <input type="number" id="num-review-questions" value="10" min="1">
                </div>
                <button id="start-review-btn" class="btn">復習開始</button>
            </fieldset>

        </div>
        <div id="test-screen" class="screen">
            <div id="progress-info"></div>
            <div id="word-container">
                <h2 id="word-display"></h2>
                <span id="speak-btn" title="発音を聞く">🔊</span>
            </div>
            <div id="feedback"></div>
            <div class="options-grid" id="options-container"></div>
            
            <div id="spelling-container" style="display: none; margin-top: 1rem; text-align: center; position: relative;">
                <div id="spelling-hint" style="display: flex; justify-content: center; flex-wrap: wrap; pointer-events: none; margin-bottom: 0.5rem;"></div>
                <div id="spelling-length-hint" style="color: #6c757d; margin-bottom: 1.5rem; font-size: 1.1rem; pointer-events: none;"></div>
                <input type="text" id="spelling-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="position: absolute; top: 0; left: 0; width: 100%; height: 80px; opacity: 0; z-index: 10; cursor: text;">
                <button id="submit-spelling-btn" class="btn" style="width: auto; position: relative; z-index: 20; display: block; margin: 0 auto;">回答する</button>
            </div>

            <button id="next-btn" class="btn">次の問題へ</button>
        </div>
        <div id="result-screen" class="screen">
            <h2>テスト終了！</h2>
            <p id="score-display"></p>
            <p id="accuracy-display"></p>
            <div id="result-details"></div> <button id="restart-btn" class="btn">もう一度挑戦する</button>
        </div>
    </div>
<script src="words1200.js"></script>
<script src="words1400.js"></script>
<script>
// ===================================================================================
// アプリケーションのコード
// ===================================================================================

let allWords = [];
let allWords1200 = [];
let allWords1400 = [];
let wordStats = {};
let quizWords = [];
let currentQuestionIndex = 0;
let score = 0;
let answeredWords = []; // ★追加：回答済みの単語を記録する配列

// --- 正答率記録機能 ---
function getStatsKey() {
    const selected = document.querySelector('input[name="wordSet"]:checked').value;
    return selected === '1200' ? 'wordTestStats' : 'wordTestStats_' + selected;
}

function loadStats() {
    const storedStats = localStorage.getItem(getStatsKey());
    if (storedStats) {
        wordStats = JSON.parse(storedStats);
    } else {
        wordStats = {};
    }
}

function saveStats() {
    localStorage.setItem(getStatsKey(), JSON.stringify(wordStats));
}

function updateStats(wordId, isCorrect) {
    if (!wordStats[wordId]) {
        wordStats[wordId] = { correct: 0, incorrect: 0 };
    }
    if (isCorrect) {
        wordStats[wordId].correct++;
    } else {
        wordStats[wordId].incorrect++;
    }
}

function getWeakWords(count) {
    const wordIds = Object.keys(wordStats);
    wordIds.sort((a, b) => {
        const statsA = wordStats[a];
        const statsB = wordStats[b];
        
        if (statsB.incorrect !== statsA.incorrect) {
            return statsB.incorrect - statsA.incorrect;
        }
        return statsA.correct - statsB.correct;
    });
    
    return wordIds.slice(0, count);
}
// --- ここまで正答率記録機能（変更なし） ---


function parseTSV(data) {
    const cleanData = data.trim().replace(/\\s*/g, '');
    const lines = cleanData.split('\n');
    lines.shift();
    const words = lines.map(line => {
        const parts = line.split('\t');
        if (parts.length < 3) return null;
        const id = parseInt(parts[0], 10);
        const word = parts[1].trim();
        const meaning = parts[2].trim();
        if (isNaN(id) || !word) return null;
        return { id, word, meaning };
    }).filter(Boolean);
    return words;
}

function extractPos(meaningStr) {
    const meaning_raw = String(meaningStr);
    const pos_map = { '名': '名詞', '動': '動詞', '形': '形容詞', '副': '副詞', '助': '助動詞', '前': '前置詞', '接': '接続詞', '代': '代名詞' };
    const match = meaning_raw.match(/[（【(](名|動|形|副|助|前|接|代)[)）】]/);
    if (match) return pos_map[match[1]] || 'その他';

    const meaning = meaning_raw.replace(/（.*?）|【.*?】|〔.*?〕|\(.*?\)/g, '').split('，')[0].split('、')[0].split('；')[0].trim();
    if (meaning.endsWith('する') || /[うくぐすずずつづぬふぶむゆる]$/.test(meaning) || meaning.includes('を') || meaning.includes('に ') || meaning.includes('と ')) {
        return '動詞';
    } else if (meaning.endsWith('い') || meaning.endsWith('な') || meaning.endsWith('的') || meaning.includes('な ')) {
        return '形容詞';
    } else if (meaning.endsWith('に') || meaning.endsWith('く') || meaning.endsWith('で')) {
        return '副詞';
    } else {
        return '名詞';
    }
}

function preprocessWords(words) {
    return words.map(w => ({
        ...w,
        pos: extractPos(w.meaning),
        main_meaning: w.meaning.split('；')[0].replace(/（.*?）|【.*?】|〔.*?〕/g, '').trim()
    }));
}

function speak(text) {
    if (!window.speechSynthesis) {
        alert("お使いのブラウザは音声合成に対応していません．");
        return;
    }
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSE(type) {
    if (!audioCtx) return;
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

    if (type === 'correct') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(783.99, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime);
            osc2.stop(audioCtx.currentTime + 0.15);
        }, 100);
    } else {
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(110, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
    }
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.2);
}

const setupScreen = document.getElementById('setup-screen');
const testScreen = document.getElementById('test-screen');
const resultScreen = document.getElementById('result-screen');
const startBtn = document.getElementById('start-btn');
const startReviewBtn = document.getElementById('start-review-btn');
const restartBtn = document.getElementById('restart-btn');
const nextBtn = document.getElementById('next-btn');
const startRangeInput = document.getElementById('start-range');
const endRangeInput = document.getElementById('end-range');
const numQuestionsInput = document.getElementById('num-questions');
const numReviewQuestionsInput = document.getElementById('num-review-questions');
const progressInfo = document.getElementById('progress-info');
const wordDisplay = document.getElementById('word-display');
const speakBtn = document.getElementById('speak-btn');
const optionsContainer = document.getElementById('options-container');
const feedback = document.getElementById('feedback');
const scoreDisplay = document.getElementById('score-display');
const accuracyDisplay = document.getElementById('accuracy-display');
const resultDetails = document.getElementById('result-details'); // ★追加
const spellingContainer = document.getElementById('spelling-container');
const spellingHint = document.getElementById('spelling-hint');
const spellingLengthHint = document.getElementById('spelling-length-hint');
const spellingInput = document.getElementById('spelling-input');
const submitSpellingBtn = document.getElementById('submit-spelling-btn');

function updateSpellingHint(isFinal = false) {
    if (currentQuestionIndex >= quizWords.length) return;
    const w = quizWords[currentQuestionIndex].word;
    const typed = spellingInput.value;
    
    let html = '';
    const displayLength = Math.max(typed.length, w.length);
    for (let i = 0; i < displayLength; i++) {
        let char = '';
        let color = '#333';
        let border = '#dcdfe6';
        let opacity = '1';
        
        const expectedChar = w.charAt(i) || '';
        const isSpace = (expectedChar === ' ' || expectedChar === '-');

        if (i < typed.length) {
            char = typed.charAt(i);
            border = '#1a73e8';
            if (isSpace && char === expectedChar) {
                border = 'transparent';
            }
        } else if (i === 0 && typed.length === 0 && !isFinal) {
            char = w.charAt(0);
            color = '#1a73e8';
            opacity = '0.5';
            if (isSpace) border = 'transparent';
        } else {
            char = isSpace ? expectedChar : '';
            color = isSpace ? '#6c757d' : 'transparent';
            border = isSpace ? 'transparent' : '#dcdfe6';
        }
        
        if (isFinal) {
            const correctWord = w.toLowerCase();
            const typedWord = typed.toLowerCase();
            const isCorrect = (correctWord === typedWord);
            
            if (i < typed.length) {
                border = isCorrect ? '#28a745' : '#dc3545';
                color = isCorrect ? '#155724' : '#721c24';
                if (isSpace && typed.charAt(i) === expectedChar) border = 'transparent';
            } else {
                border = isCorrect ? '#28a745' : '#dc3545';
                if (isSpace) border = 'transparent';
            }
        }
        
        if (char === ' ') char = '&nbsp;';
        
        html += `<div style="display: inline-block; width: 2rem; height: 2.8rem; line-height: 2.8rem; font-size: 1.8rem; font-family: monospace; font-weight: bold; text-align: center; border-bottom: 3px solid ${border}; margin: 0 0.15rem; color: ${color}; opacity: ${opacity}; text-transform: lowercase; vertical-align: bottom; transition: all 0.2s;">${char}</div>`;
    }
    
    spellingHint.innerHTML = html;
    if (!isFinal) {
        spellingLengthHint.textContent = `(${w.length}文字)`;
    } else {
        spellingLengthHint.textContent = '';
    }
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startTest(isReview = false) {
    initAudio();
    
    let availableWords;

    if (isReview) {
        const numReviewQuestions = parseInt(numReviewQuestionsInput.value);
        if (isNaN(numReviewQuestions) || numReviewQuestions < 1) {
            alert("復習する問題数を正しく入力してください．");
            return;
        }
        const weakWordIds = getWeakWords(numReviewQuestions);
        if (weakWordIds.length === 0) {
            alert("まだ学習記録がありません。まずは通常テストで学習を進めてください．");
            return;
        }
        if (weakWordIds.length < numReviewQuestions) {
            alert(`記録のある苦手な単語は${weakWordIds.length}語です。その数でテストを開始します．`);
        }
        availableWords = weakWordIds.map(id => allWords.find(w => w.id == id));
        quizWords = availableWords;
    } else {
        const startId = parseInt(startRangeInput.value);
        const endId = parseInt(endRangeInput.value);
        const numQuestions = parseInt(numQuestionsInput.value);

        if (isNaN(startId) || isNaN(endId) || isNaN(numQuestions)) {
            alert("有効な数値を入力してください．");
            return;
        }
        const maxId = allWords.length > 0 ? allWords[allWords.length - 1].id : 0;
        if (startId > endId || startId < 1 || endId > maxId) {
            alert(`出題範囲の指定が正しくありません (1～${maxId}の範囲で指定)．`);
            return;
        }
        availableWords = allWords.filter(w => w.id >= startId && w.id <= endId);
        if (numQuestions > availableWords.length) {
            alert(`指定範囲の単語数（${availableWords.length}語）を超える問題数は設定できません．`);
            return;
        }
        if (numQuestions < 1) {
            alert("問題数を1以上に設定してください．");
            return;
        }
        shuffleArray(availableWords);
        quizWords = availableWords.slice(0, numQuestions);
    }
    
    currentQuestionIndex = 0;
    score = 0;
    answeredWords = []; // ★追加：テスト開始時に配列を初期化
    setupScreen.style.display = 'none';
    resultScreen.style.display = 'none';
    testScreen.style.display = 'block';
    displayQuestion();
}

function displayQuestion() {
    feedback.textContent = '';
    nextBtn.style.display = 'none';
    if (currentQuestionIndex >= quizWords.length) {
        showResult();
        return;
    }
    progressInfo.textContent = `残り: ${quizWords.length - currentQuestionIndex}問 / 全${quizWords.length}問`;
    const currentWord = quizWords[currentQuestionIndex];
    const testMode = document.querySelector('input[name="testMode"]:checked').value;

    if (testMode === 'en2ja') {
        wordDisplay.textContent = currentWord.word;
        speakBtn.style.display = 'inline';
        speakBtn.onclick = () => { initAudio(); speak(currentWord.word); };
        optionsContainer.style.display = 'grid';
        spellingContainer.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        // ★追加: 出題時に自動で音声を再生する
        initAudio();
        speak(currentWord.word);
        
        let options = [currentWord];
        let dummyCandidates = allWords.filter(w => w.pos === currentWord.pos && w.id !== currentWord.id);
        shuffleArray(dummyCandidates);
        options = options.concat(dummyCandidates.slice(0, 7));
        if (options.length < 8) {
            let otherCandidates = allWords.filter(w => !options.some(opt => opt.id === w.id));
            shuffleArray(otherCandidates);
            options = options.concat(otherCandidates.slice(0, 8 - options.length));
        }
        shuffleArray(options);
        options.forEach(option => {
            const button = document.createElement('button');
            button.textContent = option.main_meaning;
            button.classList.add('option-btn');
            button.dataset.wordId = option.id;
            button.addEventListener('click', selectAnswer);
            optionsContainer.appendChild(button);
        });
    } else {
        wordDisplay.textContent = currentWord.meaning;
        speakBtn.style.display = 'none';
        optionsContainer.style.display = 'none';
        spellingContainer.style.display = 'block';
        
        const w = currentWord.word;
        
        spellingInput.value = '';
        spellingInput.disabled = false;
        spellingInput.style.backgroundColor = '';
        spellingInput.style.borderColor = '#dcdfe6';
        updateSpellingHint();
        submitSpellingBtn.style.display = 'block';
        spellingInput.focus();
    }
}

function selectAnswer(e) {
    const selectedButton = e.target;
    const currentWord = quizWords[currentQuestionIndex];
    const correctId = currentWord.id;
    const selectedId = parseInt(selectedButton.dataset.wordId);
    let isCorrect = (selectedId === correctId);

    updateStats(currentWord.id, isCorrect);
    answeredWords.push({ // ★追加：回答結果を記録
        word: currentWord.word,
        meaning: currentWord.meaning,
        isCorrect: isCorrect
    });

    Array.from(optionsContainer.children).forEach(btn => {
        btn.disabled = true;
        if (parseInt(btn.dataset.wordId) === correctId) {
            btn.classList.add('correct');
        }
    });

    if (isCorrect) {
        playSE('correct');
        score++;
        const correctText = Array.from(optionsContainer.children).find(btn => parseInt(btn.dataset.wordId) === correctId)?.textContent || '';
        feedback.innerHTML = `正解！<br><span style="font-size: 1rem; color: #155724;"><strong>${correctText}</strong></span>`;
        feedback.style.color = '#155724';
    } else {
        playSE('wrong');
        selectedButton.classList.add('wrong');
        const correctText = Array.from(optionsContainer.children).find(btn => parseInt(btn.dataset.wordId) === correctId)?.textContent || '';
        feedback.innerHTML = `不正解<br><span style="font-size: 1rem; color: #333;">正解: <strong>${correctText}</strong></span>`;
        feedback.style.color = '#721c24';
    }
    nextBtn.style.display = 'inline-block';
}

function submitSpellingAnswer() {
    const answer = spellingInput.value.trim().toLowerCase();
    if (answer === '') return;
    
    const currentWord = quizWords[currentQuestionIndex];
    const correctWord = currentWord.word.toLowerCase();
    const isCorrect = (answer === correctWord);

    updateStats(currentWord.id, isCorrect);
    answeredWords.push({
        word: currentWord.word,
        meaning: currentWord.meaning,
        isCorrect: isCorrect
    });
    
    spellingInput.disabled = true;
    submitSpellingBtn.style.display = 'none';
    
    speakBtn.style.display = 'inline';
    speakBtn.onclick = () => { initAudio(); speak(currentWord.word); };
    initAudio();
    speak(currentWord.word);
    
    updateSpellingHint(true);

    if (isCorrect) {
        playSE('correct');
        score++;
        feedback.innerHTML = `正解！<br><span style="font-size: 1.2rem; color: #155724;"><strong>${currentWord.word}</strong></span>`;
        feedback.style.color = '#155724';
    } else {
        playSE('wrong');
        feedback.innerHTML = `不正解<br><span style="font-size: 1.2rem; color: #721c24;">正解: <strong>${currentWord.word}</strong></span>`;
        feedback.style.color = '#721c24';
    }
    nextBtn.style.display = 'inline-block';
    setTimeout(() => nextBtn.focus(), 100);
}

function nextQuestion() {
    currentQuestionIndex++;
    displayQuestion();
}

function showResult() {
    saveStats();
    testScreen.style.display = 'none';
    resultScreen.style.display = 'block';
    const accuracy = quizWords.length > 0 ? ((score / quizWords.length) * 100).toFixed(1) : 0;
    scoreDisplay.textContent = `スコア: ${score} / ${quizWords.length}`;
    accuracyDisplay.textContent = `正答率: ${accuracy}%`;

    // ★追加：リザルトリストの表示
    resultDetails.innerHTML = '';
    const list = document.createElement('ul');
    list.classList.add('result-list');
    answeredWords.forEach(item => {
        const listItem = document.createElement('li');
        listItem.classList.add('result-item');
        listItem.innerHTML = `
            <div>
                <div class="result-word">${item.word}</div>
                <div class="result-meaning">${item.meaning}</div>
            </div>
            <div class="result-status status-${item.isCorrect ? 'correct' : 'wrong'}">${item.isCorrect ? '⭕️' : '❌'}</div>
        `;
        list.appendChild(listItem);
    });
    resultDetails.appendChild(list);
}

function updateRangeMax() {
    const maxId = allWords.length > 0 ? allWords[allWords.length - 1].id : 0;
    startRangeInput.max = maxId;
    endRangeInput.value = maxId;
    endRangeInput.max = maxId;
}

function init() {
    const rawWords1200 = parseTSV(words1200Data);
    allWords1200 = preprocessWords(rawWords1200);
    
    const rawWords1400 = parseTSV(words1400Data);
    allWords1400 = preprocessWords(rawWords1400);

    allWords = allWords1200;
    
    loadStats();
    updateRangeMax();
    
    document.querySelectorAll('input[name="wordSet"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            if (e.target.value === '1200') {
                allWords = allWords1200;
            } else {
                allWords = allWords1400;
            }
            loadStats();
            updateRangeMax();
        });
    });
    
    startBtn.addEventListener('click', () => startTest(false));
    startReviewBtn.addEventListener('click', () => startTest(true));
    nextBtn.addEventListener('click', nextQuestion);
    restartBtn.addEventListener('click', () => {
        resultScreen.style.display = 'none';
        setupScreen.style.display = 'block';
    });

    submitSpellingBtn.addEventListener('click', submitSpellingAnswer);
    spellingInput.addEventListener('input', updateSpellingHint);
    spellingInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (!spellingInput.disabled) {
                submitSpellingAnswer();
            }
        }
    });

    document.body.addEventListener('click', initAudio, { once: true });
}

init();

</script>
